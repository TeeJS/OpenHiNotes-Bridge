<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenHiNotes — Processing</title>
<style>
  :root {
    --bg: #0f1115;
    --bg-elev: #181b22;
    --bg-row: #1f232c;
    --bg-row-hover: #262b35;
    --bg-console: #0a0d13;
    --border: #2a2f3a;
    --text: #e6e8ef;
    --text-dim: #99a0b3;
    --accent: #6aa9ff;
    --accent-hover: #87baff;
    --danger: #ff6a6a;
    --success: #5fd38d;
    --warn: #f0c674;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: row;
    height: 100vh;
  }

  button {
    font: inherit;
    background: var(--accent);
    color: #0a0d13;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    height: 48px;
    min-width: 48px;
    cursor: pointer;
    font-weight: 700;
    font-size: 21px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  button:active:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: transparent; color: var(--text); border: 2px solid var(--border); }
  button.danger { background: var(--danger); color: #1a0505; }
  button.small { height: 46px; padding: 0 16px; font-size: 21px; }

  input[type="checkbox"] { width: 30px; height: 30px; accent-color: var(--accent); cursor: pointer; flex: 0 0 auto; }
  input[type="range"] { accent-color: var(--accent); height: 36px; cursor: pointer; }

  /* ---- Two equal columns, each independently laid out top-to-bottom ---- */
  .col { flex: 1 1 50%; min-width: 0; display: flex; flex-direction: column; height: 100%; }
  .col-left { border-right: 1px solid var(--border); }

  .col-header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    height: 64px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-elev);
  }
  .threshold-block { display: flex; align-items: center; gap: 10px; flex: 1 1 auto; min-width: 0; font-size: 21px; color: var(--text-dim); }
  .threshold-block input[type="range"] { flex: 1; min-width: 0; }
  .threshold-block .val { font-size: 21px; font-weight: 600; color: var(--text); min-width: 46px; }
  .spacer { flex: 1; }
  .files-label { font-weight: 700; font-size: 21px; white-space: nowrap; }
  .sel-count { color: var(--text-dim); font-size: 21px; white-space: nowrap; }

  /* ---- Left column: process output, the primary reading surface ---- */
  .console-wrap { flex: 1 1 auto; min-height: 0; padding: 14px 20px; display: flex; flex-direction: column; }
  .console {
    flex: 1 1 auto;
    min-height: 0;
    background: var(--bg-console);
    border: 2px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .console.running { border-color: var(--warn); }
  .console.success { border-color: var(--success); }
  .console.error { border-color: var(--danger); }

  .console-head {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 21px;
    font-weight: 700;
  }
  .dot { width: 13px; height: 13px; border-radius: 50%; background: var(--text-dim); flex: 0 0 auto; }
  .console.running .dot { background: var(--warn); animation: pulse 1s ease-in-out infinite; }
  .console.success .dot { background: var(--success); }
  .console.error .dot { background: var(--danger); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .console-head .when { font-weight: 400; color: var(--text-dim); font-size: 21px; margin-left: auto; }

  .console-body {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding: 14px 18px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 21px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .console-body .stderr-line { color: var(--danger); }
  .console-body.empty { color: var(--text-dim); font-family: inherit; font-size: 21px; display: flex; align-items: center; justify-content: center; height: 100%; text-align: center; }

  /* ---- Right column: file listing, bigger and easier to read ---- */
  .files-region { flex: 1 1 auto; min-height: 0; padding: 14px 20px; display: flex; flex-direction: column; }
  .files-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 21px; }
  tbody td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--bg-row-hover); }
  td.name { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 21px; }
  td.actions { text-align: right; white-space: nowrap; }
  .empty-files { color: var(--text-dim); padding: 20px; font-size: 21px; text-align: center; }
</style>
</head>
<body>

<div class="col col-left">
  <div class="col-header">
    <div class="threshold-block">
      Threshold <input type="range" id="threshold" min="0.1" max="0.9" step="0.05" value="0.35"><span class="val" id="thresholdVal">0.35</span>
    </div>
    <button id="runBtn">Run process</button>
  </div>
  <div class="console-wrap">
    <div class="console" id="console">
      <div class="console-head">
        <div class="dot" id="dot"></div>
        <span id="statusText">Idle</span>
        <span class="when" id="whenText"></span>
      </div>
      <div class="console-body empty" id="consoleBody">Nothing has run yet — press "Run process" to start.</div>
    </div>
  </div>
</div>

<div class="col col-right">
  <div class="col-header">
    <input type="checkbox" id="selectAll">
    <span class="files-label">Files on server</span>
    <span class="sel-count" id="selCount">0 selected</span>
    <div class="spacer"></div>
    <button class="secondary small" id="processSelectedBtn" disabled>Process selected</button>
    <button class="secondary small" id="deleteSelectedBtn" disabled>Delete selected</button>
    <button class="secondary small" id="refreshBtn">Refresh</button>
  </div>
  <div class="files-region">
    <div class="files-scroll">
      <table><tbody id="rows"></tbody></table>
      <div class="empty-files" id="emptyMsg" style="display:none">No files yet.</div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const selected = new Set();
let files = [];
let jobPoll = null;

function formatBytes(n) {
  if (!n) return '0 B';
  const units = ['B', 'KiB', 'MiB', 'GiB'];
  let v = n, i = 0;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return `${v.toFixed(v >= 10 || i === 0 ? 0 : 1)} ${units[i]}`;
}

async function refreshFiles() {
  try {
    const r = await fetch('/api/files');
    const data = await r.json();
    files = (data.files || []).sort((a, b) => (a.mtime < b.mtime ? 1 : -1));
    for (const s of Array.from(selected)) {
      if (!files.some((f) => f.name === s)) selected.delete(s);
    }
  } catch { files = []; }
  renderFiles();
}

function renderFiles() {
  const rows = $('rows');
  rows.innerHTML = '';
  $('emptyMsg').style.display = files.length ? 'none' : 'block';
  for (const f of files) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="width:44px"><input type="checkbox" data-name="${f.name}" ${selected.has(f.name) ? 'checked' : ''}></td>
      <td class="name">${f.name}</td>
      <td style="text-align:right; color:var(--text-dim); white-space:nowrap;">${formatBytes(f.size)}</td>
      <td class="actions"><button class="secondary small" data-del="${f.name}">Delete</button></td>
    `;
    rows.appendChild(tr);
  }
  rows.querySelectorAll('input[type=checkbox]').forEach((cb) => {
    cb.addEventListener('change', () => {
      const name = cb.dataset.name;
      if (cb.checked) selected.add(name); else selected.delete(name);
      updateSelectionUI();
    });
  });
  rows.querySelectorAll('button[data-del]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      if (!confirm(`Delete ${btn.dataset.del}?`)) return;
      await fetch(`/api/files/${encodeURIComponent(btn.dataset.del)}`, { method: 'DELETE' });
      selected.delete(btn.dataset.del);
      refreshFiles();
    });
  });
  updateSelectionUI();
}

function updateSelectionUI() {
  $('selCount').textContent = `${selected.size} selected`;
  $('processSelectedBtn').disabled = selected.size === 0 || $('runBtn').disabled;
  $('deleteSelectedBtn').disabled = selected.size === 0;
  $('selectAll').checked = files.length > 0 && selected.size === files.length;
  $('selectAll').indeterminate = selected.size > 0 && selected.size < files.length;
}

$('selectAll').addEventListener('change', () => {
  selected.clear();
  if ($('selectAll').checked) files.forEach((f) => selected.add(f.name));
  renderFiles();
});

$('deleteSelectedBtn').addEventListener('click', async () => {
  if (!confirm(`Delete ${selected.size} file(s)?`)) return;
  for (const name of Array.from(selected)) {
    await fetch(`/api/files/${encodeURIComponent(name)}`, { method: 'DELETE' });
  }
  selected.clear();
  refreshFiles();
});

$('refreshBtn').addEventListener('click', refreshFiles);

$('threshold').addEventListener('input', () => {
  $('thresholdVal').textContent = $('threshold').value;
});

function renderConsole(job) {
  const body = $('consoleBody');
  const combined = [
    ...(job?.stdout ? job.stdout.split('\n').map((l) => ({ l, err: false })) : []),
    ...(job?.stderr ? job.stderr.split('\n').map((l) => ({ l, err: true })) : []),
  ];
  if (combined.length === 0) {
    body.className = 'console-body empty';
    body.textContent = 'Nothing has run yet — press "Run process" to start.';
    return;
  }
  body.className = 'console-body';
  body.innerHTML = combined
    .map(({ l, err }) => `<div${err ? ' class="stderr-line"' : ''}>${l.replace(/</g, '&lt;')}</div>`)
    .join('');
  body.scrollTop = body.scrollHeight;
}

function setStatus(job) {
  const status = job?.status || 'idle';
  const consoleEl = $('console');
  consoleEl.className = `console ${status}`;
  $('statusText').textContent = status.charAt(0).toUpperCase() + status.slice(1) +
    (status === 'error' && job?.exitCode != null ? ` (exit ${job.exitCode})` : '');

  let when = '';
  if (job?.startedAt) when += `started ${new Date(job.startedAt).toLocaleTimeString()}`;
  if (job?.completedAt) when += (when ? ' · ' : '') + `finished ${new Date(job.completedAt).toLocaleTimeString()}`;
  $('whenText').textContent = when;

  $('runBtn').disabled = status === 'running';
  updateSelectionUI();
  renderConsole(job);

  if (status === 'running') {
    if (!jobPoll) jobPoll = setInterval(pollStatus, 1000);
  } else if (jobPoll) {
    clearInterval(jobPoll);
    jobPoll = null;
    refreshFiles();
  }
}

async function pollStatus() {
  const r = await fetch('/api/status');
  const data = await r.json();
  setStatus(data.job);
}

async function runProcess(fileList) {
  const body = { threshold: Number($('threshold').value) };
  if (fileList && fileList.length) body.files = fileList;
  const r = await fetch('/api/process', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  if (data.job) setStatus(data.job);
}

$('runBtn').addEventListener('click', () => runProcess());
$('processSelectedBtn').addEventListener('click', () => runProcess(Array.from(selected)));

(async function init() {
  await refreshFiles();
  const r = await fetch('/api/status');
  const data = await r.json();
  setStatus(data.job);
})();
</script>
</body>
</html>
