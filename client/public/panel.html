<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenHiNotes — Processing</title>
<style>
  :root {
    --bg: #0f1115;
    --bg-elev: #181b22;
    --bg-row: #1f232c;
    --bg-row-hover: #262b35;
    --border: #2a2f3a;
    --text: #e6e8ef;
    --text-dim: #99a0b3;
    --accent: #6aa9ff;
    --accent-hover: #87baff;
    --danger: #ff6a6a;
    --danger-hover: #ff8585;
    --success: #5fd38d;
    --warn: #f0c674;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  button {
    font: inherit;
    background: var(--accent);
    color: #0a0d13;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    height: 48px;
    min-width: 48px;
    cursor: pointer;
    font-weight: 700;
    font-size: 16px;
  }
  button:active:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 2px solid var(--border);
  }
  button.danger { background: var(--danger); color: #1a0505; }

  input[type="checkbox"] { width: 34px; height: 34px; accent-color: var(--accent); cursor: pointer; }
  thead th:first-child, tbody td:first-child { padding: 10px 14px 10px 20px; }
  input[type="range"] { accent-color: var(--accent); height: 36px; cursor: pointer; }

  /* ---- Top control strip (fixed, never scrolls) ---- */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 0 24px;
    height: 108px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-elev);
  }
  .status-block { display: flex; flex-direction: column; gap: 4px; min-width: 220px; }
  .status-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .status-value { font-size: 28px; font-weight: 700; line-height: 1.1; }
  .status-value.idle { color: var(--text-dim); }
  .status-value.running { color: var(--warn); }
  .status-value.success { color: var(--success); }
  .status-value.error { color: var(--danger); }

  .threshold-block { display: flex; flex-direction: column; gap: 4px; flex: 0 0 260px; }
  .threshold-block .row { display: flex; align-items: center; gap: 12px; }
  .threshold-block input[type="range"] { flex: 1; }
  .threshold-block .val { font-size: 18px; font-weight: 600; min-width: 44px; text-align: right; }

  .spacer { flex: 1; }

  .last-line {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    color: var(--text-dim);
    max-width: 420px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ---- Files region (the only scrolling region) ---- */
  main { flex: 1 1 auto; min-height: 0; padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }
  .files-toolbar { flex: 0 0 auto; display: flex; align-items: center; gap: 12px; }
  .files-toolbar .count { color: var(--text-dim); font-size: 14px; }

  .table-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; border: 1px solid var(--border); border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  thead th {
    position: sticky; top: 0;
    background: var(--bg-elev);
    text-align: left;
    color: var(--text-dim);
    font-weight: 600;
    font-size: 13px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); height: 52px; }
  tbody tr:hover { background: var(--bg-row-hover); }
  td.name { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13.5px; }
  td.right { text-align: right; white-space: nowrap; }
  td.actions { text-align: right; white-space: nowrap; }
  td.actions button { margin-left: 8px; height: 40px; padding: 0 14px; font-size: 14px; }

  .empty { color: var(--text-dim); padding: 24px; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="status-block">
    <div class="status-label">Processing</div>
    <div class="status-value idle" id="statusValue">Idle</div>
  </div>

  <div class="threshold-block">
    <div class="status-label">Threshold <span class="val" id="thresholdVal">0.35</span></div>
    <div class="row">
      <input type="range" id="threshold" min="0.1" max="0.9" step="0.05" value="0.35">
    </div>
  </div>

  <button id="runBtn">Run process</button>

  <div class="spacer"></div>
  <div class="last-line" id="lastLine"></div>
</header>

<main>
  <div class="files-toolbar">
    <input type="checkbox" id="selectAll">
    <span class="count" id="selCount">0 selected</span>
    <div class="spacer"></div>
    <button class="secondary" id="processSelectedBtn" disabled>Process selected</button>
    <button class="secondary" id="deleteSelectedBtn" disabled>Delete selected</button>
    <button class="secondary" id="refreshBtn">Refresh</button>
  </div>
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th style="width:44px"></th>
          <th>Filename</th>
          <th class="right" style="width:110px">Size</th>
          <th class="right" style="width:170px">Modified</th>
          <th class="right" style="width:100px">Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="emptyMsg" style="display:none">No files yet.</div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const selected = new Set();
let files = [];
let jobPoll = null;

function formatBytes(n) {
  if (!n) return '0 B';
  const units = ['B', 'KiB', 'MiB', 'GiB'];
  let v = n, i = 0;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return `${v.toFixed(v >= 10 || i === 0 ? 0 : 1)} ${units[i]}`;
}
function formatModified(iso) {
  const d = new Date(iso);
  const pad = (x) => String(x).padStart(2, '0');
  return `${d.getMonth() + 1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function refreshFiles() {
  const r = await fetch('/api/files');
  const data = await r.json();
  files = (data.files || []).sort((a, b) => (a.mtime < b.mtime ? 1 : -1));
  for (const s of Array.from(selected)) {
    if (!files.some((f) => f.name === s)) selected.delete(s);
  }
  renderFiles();
}

function renderFiles() {
  const rows = $('rows');
  rows.innerHTML = '';
  $('emptyMsg').style.display = files.length ? 'none' : 'block';
  for (const f of files) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="checkbox" data-name="${f.name}" ${selected.has(f.name) ? 'checked' : ''}></td>
      <td class="name">${f.name}</td>
      <td class="right">${formatBytes(f.size)}</td>
      <td class="right">${formatModified(f.mtime)}</td>
      <td class="actions"><button class="danger" data-del="${f.name}">Delete</button></td>
    `;
    rows.appendChild(tr);
  }
  rows.querySelectorAll('input[type=checkbox]').forEach((cb) => {
    cb.addEventListener('change', () => {
      const name = cb.dataset.name;
      if (cb.checked) selected.add(name); else selected.delete(name);
      updateSelectionUI();
    });
  });
  rows.querySelectorAll('button[data-del]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      if (!confirm(`Delete ${btn.dataset.del}?`)) return;
      await fetch(`/api/files/${encodeURIComponent(btn.dataset.del)}`, { method: 'DELETE' });
      selected.delete(btn.dataset.del);
      refreshFiles();
    });
  });
  updateSelectionUI();
}

function updateSelectionUI() {
  $('selCount').textContent = `${selected.size} selected`;
  $('processSelectedBtn').disabled = selected.size === 0;
  $('deleteSelectedBtn').disabled = selected.size === 0;
  $('selectAll').checked = files.length > 0 && selected.size === files.length;
  $('selectAll').indeterminate = selected.size > 0 && selected.size < files.length;
}

$('selectAll').addEventListener('change', () => {
  selected.clear();
  if ($('selectAll').checked) files.forEach((f) => selected.add(f.name));
  renderFiles();
});

$('deleteSelectedBtn').addEventListener('click', async () => {
  if (!confirm(`Delete ${selected.size} file(s)?`)) return;
  for (const name of Array.from(selected)) {
    await fetch(`/api/files/${encodeURIComponent(name)}`, { method: 'DELETE' });
  }
  selected.clear();
  refreshFiles();
});

$('refreshBtn').addEventListener('click', refreshFiles);

$('threshold').addEventListener('input', () => {
  $('thresholdVal').textContent = $('threshold').value;
});

function setStatus(job) {
  const el = $('statusValue');
  const status = job?.status || 'idle';
  el.textContent = status.charAt(0).toUpperCase() + status.slice(1);
  el.className = `status-value ${status}`;
  $('runBtn').disabled = status === 'running';
  $('processSelectedBtn').disabled = status === 'running' || selected.size === 0;

  const out = (job?.stderr || job?.stdout || '').trim().split('\n').pop() || '';
  $('lastLine').textContent = out;

  if (status === 'running') {
    if (!jobPoll) jobPoll = setInterval(pollStatus, 1000);
  } else if (jobPoll) {
    clearInterval(jobPoll);
    jobPoll = null;
    refreshFiles();
  }
}

async function pollStatus() {
  const r = await fetch('/api/status');
  const data = await r.json();
  setStatus(data.job);
}

async function runProcess(fileList) {
  const body = { threshold: Number($('threshold').value) };
  if (fileList && fileList.length) body.files = fileList;
  const r = await fetch('/api/process', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  if (data.job) setStatus(data.job);
}

$('runBtn').addEventListener('click', () => runProcess());
$('processSelectedBtn').addEventListener('click', () => runProcess(Array.from(selected)));

(async function init() {
  await refreshFiles();
  const r = await fetch('/api/status');
  const data = await r.json();
  setStatus(data.job);
})();
</script>
</body>
</html>
