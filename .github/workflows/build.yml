name: build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch:

# One run per ref; cancel in-progress on new pushes to the same branch/PR
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # github.repository preserves case (TeeJS/OpenHiNotes-Bridge), but GHCR
  # only accepts lowercase. docker/metadata-action lowercases by default,
  # so this is safe to feed in directly.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------- 1) typecheck + build (Node) — fail fast before Docker ----------
  ci:
    name: typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: install dependencies
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: build
        run: npm run build

  # ---------- 2) build & publish container image ----------
  docker:
    name: build & publish image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        # Skip login on pull_request (forks have no secret access).
        # The PR job still builds the image to prove the Dockerfile works,
        # it just doesn't push.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Normalize tags to lowercase (GHCR rejects uppercase).
          tags: |
            # latest on default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # semantic version tags (v1.2.3 -> 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # short SHA on every build
            type=sha,format=short
            # branch name for non-default branches
            type=ref,event=branch,enable=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
            # PR builds get pr-N tag (built but not pushed)
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=OpenHiNotes-Bridge
            org.opencontainers.image.description=Bare-bones WebUSB bridge for HiDock P1
            org.opencontainers.image.licenses=MIT

      - name: build (and push on non-PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          outputs: type=image,oci-mediatypes=false,push=${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Leave provenance/sbom at buildx defaults so the pushed tag points
          # at an OCI image index (not a bare single manifest). Unraid's
          # Docker update checker reads the index format; without it the tag
          # shows as "not available" on the Docker page even though pulls work.
